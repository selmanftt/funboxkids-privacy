<title>FunBox Kids</title>
<style>

.card{background:#fff;border-radius:24px;padding:48px 36px;text-align:center;max-width:400px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,.2);}

h1 span{color:#667eea;}

.links a{display:block;padding:14px 24px;border-radius:14px;text-decoration:none;font-weight:700;font-size:15px;transition:.2s;}
.links a:hover{transform:scale(1.02);}
.links a.primary{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;}
.links a.secondary{background:#f4f4f8;color:#333;}
.footer{margin-top:28px;font-size:12px;color:#aaa;}
